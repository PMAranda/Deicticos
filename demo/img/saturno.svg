<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sat" cx="38%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#f0dcab"/>
      <stop offset="60%" stop-color="#d4ad6b"/>
      <stop offset="100%" stop-color="#9c7636"/>
    </radialGradient>
  </defs>
  <g transform="rotate(-18 50 50)">
    <!-- anillo completo (queda visible por detrás en la mitad superior) -->
    <ellipse cx="50" cy="50" rx="47" ry="14" fill="none" stroke="#e6c886" stroke-width="5" opacity="0.85"/>
    <ellipse cx="50" cy="50" rx="47" ry="14" fill="none" stroke="#a87f3e" stroke-width="1.5" opacity="0.6"/>
    <!-- planeta encima del anillo -->
    <circle cx="50" cy="50" r="27" fill="url(#sat)"/>
    <g opacity="0.4" fill="none" stroke="#b58c4a" stroke-width="2">
      <path d="M27 44 q23 -5 46 0"/>
      <path d="M25 56 q25 5 50 0"/>
    </g>
    <!-- mitad frontal del anillo, por delante del planeta -->
    <path d="M3 50 a47 14 0 0 0 94 0" fill="none" stroke="#e6c886" stroke-width="5" opacity="0.9"/>
  </g>
</svg>
